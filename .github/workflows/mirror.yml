# Mirrors main to desotoTF/tf-manumanuals on every push
name: Auto Push to Secondary Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  copy_to_secondary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Primary Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify secondary token is present
        id: secondary_token
        env:
          SECONDARY_REPO_TOKEN: ${{ secrets.SECONDARY_REPO_TOKEN }}
        run: |
          if [ -z "$SECONDARY_REPO_TOKEN" ]; then
            echo "SECONDARY_REPO_TOKEN is not configured; skipping mirror push."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Token present (length: ${#SECONDARY_REPO_TOKEN})."
          echo "has_token=true" >> "$GITHUB_OUTPUT"

      - name: Push to Secondary Repo
        if: steps.secondary_token.outputs.has_token == 'true'
        env:
          SECONDARY_REPO_TOKEN: ${{ secrets.SECONDARY_REPO_TOKEN }}
        run: |
          # Fine-grained PATs authenticate as the token owner; the URL username
          # must be that GitHub account (desotoTF), not "x-access-token"
          # (which is reserved for GitHub App installation tokens).
          git remote add secondary "https://desotoTF:${SECONDARY_REPO_TOKEN}@github.com/desotoTF/tf-manumanuals.git"
          git push secondary main --force
